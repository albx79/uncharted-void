<!-- Google Fonts: Orbitron for name, Open Sans for body -->
<link href="https://fonts.googleapis.com/css?family=Orbitron:700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Open+Sans:600,400&display=swap" rel="stylesheet">

<style>
.card-horizontal {
  width: 480px;
  height: 340px;
  background: linear-gradient(120deg, #1b1c28 78%, #354b67 100%);
  border: 6px solid #ffad42; /* Replace with faction/resource color */
  border-radius: 28px;
  box-shadow: 0 6px 32px #111b;
  overflow: hidden;
  position: relative;
  font-family: 'Open Sans', Arial, sans-serif;
  color: #efeff3;
  margin: 1em;
  display: flex;
  flex-direction: row;
}
.card-horizontal .card-art {
  flex: 1 0 58%;
  height: 100%;
  overflow: hidden;
  background: #23263e;
  position: relative;
  border-radius: 22px 0 0 22px;
}
.card-horizontal .card-art img {
  object-fit: cover;
  width: 100%; height: 100%;
  border-radius: 22px 0 0 22px;
}
.card-horizontal .card-info {
  flex: 1 0 42%;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 22px 16px;
  position: relative;
}
.card-horizontal .card-name {
  font-family: 'Orbitron', Arial, sans-serif;
  font-weight: 700;
  font-size: 1.63em;
  color: #ffd950;
  margin-bottom: 0.15em;
  white-space: nowrap;
  text-shadow: 0 2px 4px #000b;
}
.card-horizontal .card-meta {
  /* rarity, type, subtypes */
  font-size: 0.94em;
  letter-spacing: 0.04em;
  color: #b5beee;
  margin-bottom: 0.31em;
}
.card-horizontal .card-faction {
  font-size: 1.03em;
  color: #77f4d9;
  margin-bottom: 0.6em;
}
.card-horizontal .card-cost {
  position: absolute;
  top: 19px; right: 20px;
  color: #d2e1ef; background: #222e; border-radius: 12px; padding: 3px 11px;
  font-size: 0.95em; font-weight: bold; letter-spacing: 0.04em;
  z-index: 4;
}
.card-horizontal .card-bar-damage {
  position: absolute;
  top: 15px; right: 87px;  /* Adjust as needed to fit art/text */
  display: flex;
  gap: 5px;
}
.card-horizontal .card-bar-damage .damage-dot {
  width: 23px; height: 23px;
  border-radius: 50%;
  border: 2.5px solid #fe7676;
  background: #3a2233;
  margin-left: 0;
  box-shadow: 0 0 6px #ed202099;
}
.card-horizontal .card-bar-damage .damage-dot.filled {
  background: #ed2020;
  border: 2.5px solid #fff7;
}
.card-horizontal .card-text {
  font-size: 1em;
  color: #e2e7f7;
  margin-top: 1.0em;
  min-height: 4.25em;
}
.card-horizontal .card-skills {
  margin-top: auto;
  padding-top: .8em;
  display: flex;
  gap: 1.2em;
  font-size: 0.97em;
  color: #95bee8;
}
.card-horizontal .d6-value {
  position: absolute;
  bottom: 18px;
  left:50%; transform:translateX(-50%);
  background: #0b2e3c;
  color: #ffe066;
  font-family: Orbitron, monospace;
  font-size: 1.30em;
  font-weight: bold;
  border: 2.3px solid #ffe066;
  border-radius: 40px;
  box-shadow: 0 0 0 5px #ffe06644;
  width: 43px; height: 43px;
  display: flex; align-items: center; justify-content: center;
  z-index: 9;
}
</style>

<div class="card-horizontal">
  <div class="card-art">
    <img src="https://images.unsplash.com/photo-1464983953574-0892a716854b?auto=format&fit=crop&w=700&q=80" alt="Ship Art">
    <!-- You can layer SVG greebling/effects here for borders -->
  </div>
  <div class="card-info">
    <div class="card-name">STARDIVER MK IV</div>
    <div class="card-meta">Rare &bull; Ship &bull; Frigate</div>
    <div class="card-faction">Vanguard</div>
    <div class="card-cost">2 Tech, 1 Tactical</div>
    <!-- Damage Bar: Show e.g., 3 circles for SIZ=3. 'filled' = damage -->
    <div class="card-bar-damage">
      <div class="damage-dot"></div>
      <div class="damage-dot"></div>
      <div class="damage-dot filled"></div>
    </div>
    <div class="card-text">
      <b>Crew:</b> 2+<br>
      <b>Weapons:</b> 3<br>
      <b>Range:</b> 2<br>
      Frigate-class scout; gains +1 Weapons while undamaged.<br>
      <em>Fleet standard, often first to cross beyond mapped space.</em>
    </div>
    <div class="card-skills">
      <div><b>CHA</b>: 2</div>
      <div><b>INT</b>: 2</div>
      <div><b>STR</b>: 3</div>
      <div><b>WRD</b>: 1</div>
    </div>
    <div class="d6-value">3</div>
  </div>
</div>
